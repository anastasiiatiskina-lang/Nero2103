<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>404. Здесь ничего нет. NERO 21</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script>
    // SPA-восстановление для внутренних маршрутов
    (function () {
      var known = {
        '': 1, 'manifest': 1, 'portfolio': 1, 'audit': 1,
        'identity': 1, 'producing': 1, 'contact': 1
      };
      var knownCases = { 'ambra': 1 };

      var l = window.location;
      var pathParts = l.pathname.split('/').filter(function (p) { return p.length; });

      var isKnownRoute = false;
      if (pathParts.length === 0) {
        isKnownRoute = true;
      } else if (pathParts.length === 1 && known[pathParts[0].toLowerCase()] === 1) {
        isKnownRoute = true;
      } else if (pathParts.length === 2 && pathParts[0].toLowerCase() === 'work' && knownCases[pathParts[1].toLowerCase()] === 1) {
        isKnownRoute = true;
      }

      if (isKnownRoute) {
        // Тихий SPA-редирект: /manifest → /?/manifest, index.html восстановит
        var pathSegmentsToKeep = 0;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      }
      // Иначе — оставляем страницу видимой (это настоящий 404, не наш маршрут)
    })();
  </script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: #f5f3ee; }
    body {
      font-family: 'Playfair Display', 'Cormorant Garamond', Georgia, serif;
      color: #0a0a0a;
      overflow: hidden;
    }
    .nf {
      position: relative;
      width: 100%;
      height: 100vh;
      background-image: url('/404-fresh-800.jpg');
      background-position: center right;
      background-size: cover;
      background-repeat: no-repeat;
      background-color: #f5f3ee;
    }
    @media (min-width: 600px) {
      .nf { background-image: url('/404-fresh-1200.jpg'); }
    }
    @media (min-width: 1200px) {
      .nf { background-image: url('/404-fresh-1920.jpg'); }
    }
    .nf-copy {
      position: absolute;
      top: 12vh;
      left: 8vw;
      max-width: 44vw;
      display: flex;
      flex-direction: column;
      gap: 24px;
      z-index: 2;
    }
    .nf-eyebrow {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 10px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #666;
    }
    .nf-num {
      font-weight: 300;
      font-size: clamp(96px, 16vw, 220px);
      line-height: 0.9;
      letter-spacing: 0.02em;
      margin: 0;
    }
    .nf-title {
      font-weight: 400;
      font-size: clamp(20px, 2.4vw, 32px);
      line-height: 1.3;
      margin: 0;
      max-width: 500px;
    }
    .nf-sub {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      line-height: 1.55;
      color: #444;
      max-width: 420px;
      margin: 0;
    }
    .nf-cta {
      margin-top: 16px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 40px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 11px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #0a0a0a;
      background: #f5f3ee;
      border: 1px solid #0a0a0a;
      text-decoration: none;
      cursor: pointer;
      width: max-content;
      transition: background 0.4s ease, color 0.4s ease, letter-spacing 0.4s ease;
    }
    .nf-cta:hover {
      background: #0a0a0a;
      color: #f5f3ee;
      letter-spacing: 0.42em;
    }
    .nf-foot {
      position: absolute;
      bottom: 24px;
      left: 8vw;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 9px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: #999;
      z-index: 2;
    }
    @media (max-width: 900px) {
      .nf {
        background-position: center bottom;
        background-size: 140% auto;
      }
      .nf-copy {
        top: 40px;
        left: 24px;
        right: 24px;
        max-width: none;
        gap: 16px;
      }
      .nf-num { font-size: clamp(72px, 22vw, 140px); }
      .nf-title { font-size: 20px; }
      .nf-foot { left: 24px; bottom: 20px; }
    }
  </style>
</head>
<body>
  <main class="nf">
    <div class="nf-copy">
      <div class="nf-eyebrow">Четыреста четвёртая</div>
      <h1 class="nf-num">404</h1>
      <p class="nf-title">Даже я поискала. Здесь ничего нет.</p>
      <p class="nf-sub">Возможно, ссылка устарела или её никогда не было. Возвращайтесь на главную. Там точно что-то есть.</p>
      <a class="nf-cta" href="/">← На главную</a>
    </div>
    <div class="nf-foot">NERO 21 · Санкт-Петербург</div>
  </main>
</body>
