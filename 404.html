<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>NERO 21</title>
  <script>
    // Single Page Apps for GitHub Pages
    // MIT License by Rafael Pedicini · https://github.com/rafgraph/spa-github-pages
    // Redirects any path (e.g. /producing) to index.html?/producing so
    // the SPA can restore the original URL via history.replaceState().
    (function () {
      var pathSegmentsToKeep = 0; // 0 for custom domain (nero21.studio)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    })();
  </script>
</head>
<body></body>
</html>
